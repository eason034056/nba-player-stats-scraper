# GitHub Actions Workflow: NBA Player Game Logs Scraper
# =====================================================
# 這個 workflow 會每天早上 6 點（芝加哥時間）自動執行爬蟲
# 並將更新的 CSV 檔案 commit 回 repository

# name: workflow 的名稱，會顯示在 GitHub Actions 頁面
name: NBA Player Game Logs Scraper

# on: 定義觸發 workflow 的條件
on:
  # schedule: 定時執行（使用 cron 語法）
  schedule:
    # cron 語法說明：分 時 日 月 週
    # "0 12 * * *" 的意思是：
    #   - 0: 第 0 分鐘
    #   - 12: 第 12 小時（UTC 時間）
    #   - *: 每天
    #   - *: 每月
    #   - *: 每週的每一天
    # 
    # 【重要】GitHub Actions 使用 UTC 時間！
    # UTC 12:00 = 芝加哥時間 (UTC-6 CST / UTC-5 CDT) 06:00
    # 所以設定 12 點 UTC = 芝加哥早上 6 點
    # 註：芝加哥使用日光節約時間，冬季 UTC-6，夏季 UTC-5
    - cron: '0 12 * * *'
  
  # workflow_dispatch: 允許手動觸發
  # 這樣你可以在 GitHub 網頁上手動執行測試
  workflow_dispatch:
    # inputs: 定義手動觸發時可以輸入的參數
    inputs:
      debug_enabled:
        type: boolean
        description: '啟用 debug 模式'
        required: false
        default: false

# jobs: 定義要執行的工作
jobs:
  # scrape: 工作的 ID（自定義名稱）
  scrape:
    # name: 工作的顯示名稱
    name: Scrape NBA Player Game Logs
    
    # runs-on: 指定執行環境
    # ubuntu-latest: 使用最新版本的 Ubuntu Linux
    runs-on: ubuntu-latest
    
    # timeout-minutes: 設定最長執行時間（分鐘）
    # 增量模式通常只需要 30-60 分鐘，但完整爬取可能需要 4 小時
    # GitHub Actions 免費版最長 6 小時
    timeout-minutes: 240
    
    # permissions: 設定 GITHUB_TOKEN 的權限
    # 需要 contents: write 才能 push 檔案到 repository
    permissions:
      contents: write
    
    # steps: 定義執行步驟
    steps:
      # ============================================================
      # 步驟 1: Checkout Repository
      # ============================================================
      # uses: 使用 GitHub 官方或社群提供的 action
      # actions/checkout@v6: 將 repository 的程式碼下載到執行環境（支援 Node.js 24）
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          # fetch-depth: 0 表示取得完整的 git 歷史
          # 這對於 commit 操作是必要的
          fetch-depth: 0
          # 明確指定 token，避免憑證不一致
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # ============================================================
      # 步驟 2: 設定 Python 環境
      # ============================================================
      # actions/setup-python@v6: 設定 Python 環境（支援 Node.js 24）
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # python-version: 指定 Python 版本
          python-version: '3.11'
          # cache: 快取 pip 套件，加速後續執行
          cache: 'pip'
      
      # ============================================================
      # 步驟 3: 安裝 Chrome 瀏覽器
      # ============================================================
      # 這一步在 Ubuntu 環境中安裝 Google Chrome
      # Selenium 需要實際的瀏覽器來執行
      - name: Install Chrome
        run: |
          # 更新套件列表
          sudo apt-get update
          # 安裝 wget（下載工具）
          sudo apt-get install -y wget
          # 從 Google 官方下載最新版 Chrome
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          # 安裝 Chrome（-y 自動同意，--fix-broken 修復依賴問題）
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb --fix-broken
          # 顯示 Chrome 版本（用於除錯）
          google-chrome --version
      
      # ============================================================
      # 步驟 4: 安裝 Python 依賴套件
      # ============================================================
      - name: Install Python dependencies
        run: |
          # 升級 pip 到最新版本
          python -m pip install --upgrade pip
          # 安裝 requirements.txt 中列出的所有套件
          pip install -r requirements.txt
      
      # ============================================================
      # 步驟 5: 執行爬蟲
      # ============================================================
      - name: Run Scraper
        # timeout-minutes: 單一步驟的超時時間
        # 設定為 180 分鐘（3 小時），給完整爬取足夠時間
        timeout-minutes: 180
        # continue-on-error: 即使爬蟲失敗，也繼續執行後續步驟
        # 這樣可以確保已收集的資料被儲存
        continue-on-error: true
        id: scraper
        run: |
          # 執行爬蟲腳本
          python scrape_nba.py
        # env: 設定環境變數
        env:
          # PYTHONUNBUFFERED: 讓 Python 輸出不被緩衝
          # 這樣可以即時看到輸出
          PYTHONUNBUFFERED: '1'
      
      # ============================================================
      # 步驟 6: 上傳日誌檔案（作為 artifact）
      # ============================================================
      # 即使爬蟲失敗，也上傳日誌供除錯
      - name: Upload logs
        uses: actions/upload-artifact@v7
        # if: always() 表示不管前面的步驟成功或失敗，都執行這一步
        if: always()
        with:
          # name: artifact 的名稱
          name: scrape-logs
          # path: 要上傳的檔案
          path: scrape_log.txt
          # retention-days: 保留天數
          retention-days: 7
      
      # ============================================================
      # 步驟 7: Commit 並 Push 更新的 CSV 檔案
      # ============================================================
      # 即使爬蟲部分失敗，也嘗試儲存已收集的資料
      - name: Commit and Push changes
        if: always()
        run: |
          # 設定 git 使用者資訊
          # 這是 GitHub Actions bot 的標準設定
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 取得當前日期（台灣時間）
          # TZ='Asia/Taipei' 設定時區
          # date '+%Y-%m-%d %H:%M:%S' 格式化日期
          CURRENT_DATE=$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M:%S')
          
          # 檢查 CSV 檔案是否存在
          if [ -f "nba_player_game_logs.csv" ]; then
            # 加入 CSV 檔案到 staging area
            git add nba_player_game_logs.csv
            
            # 檢查是否有變更需要 commit
            if git diff --staged --quiet; then
              echo "沒有變更需要 commit"
            else
              # 根據爬蟲執行結果決定 commit 訊息
              if [ "${{ steps.scraper.outcome }}" == "success" ]; then
                COMMIT_MSG="📊 Update NBA player game logs - ${CURRENT_DATE}"
              else
                COMMIT_MSG="📊 Partial update NBA player game logs - ${CURRENT_DATE} (部分成功)"
              fi
              
              # 執行 commit
              git commit -m "${COMMIT_MSG}"
              # 明確設定 remote 使用 GITHUB_TOKEN
              git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
              # Push 到 repository（最多重試 3 次）
              for attempt in 1 2 3; do
                if git push; then
                  break
                fi
                echo "⚠️ Push 失敗，將在 5 秒後重試（第 ${attempt} 次）"
                sleep 5
              done
              echo "✓ 已成功更新並 push CSV 檔案"
            fi
          else
            echo "⚠️ CSV 檔案不存在，跳過 commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # ============================================================
      # 步驟 8: 檢查最終狀態
      # ============================================================
      - name: Check final status
        if: always()
        run: |
          if [ "${{ steps.scraper.outcome }}" == "success" ]; then
            echo "✅ 爬蟲執行成功"
            exit 0
          else
            echo "⚠️ 爬蟲執行遇到問題，請檢查日誌"
            # 不要讓整個 workflow 失敗，因為資料可能已經部分更新
            exit 0
          fi
